<!DOCTYPE html>
<html>
<head>
    <title>Feedback List</title>

    <style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

:root {
    --accent: #ff2b2b;
    --accent-light: #ff6b6b;
    --panel: rgba(12, 12, 12, 0.92);
    --muted: rgba(255,255,255,0.75);
}

* {
    font-family: 'Poppins', sans-serif;
    box-sizing: border-box;
}

body {
    height: 100vh;
    margin: 0;
    padding: 30px;
    background:
      linear-gradient(rgba(0,0,0,0.75), rgba(10,0,0,0.75)),
      url('https://images.unsplash.com/photo-1605296867304-46d5465a13f1?auto=format&fit=crop&w=1920&q=80')
      center/cover fixed no-repeat;
    color: #fff;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    display: flex;
    justify-content: center;
    align-items: flex-start;
}


/* Title */
h2 {
    margin-bottom: 22px;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--accent);
    text-shadow: 0 0 10px rgba(255,0,0,0.25);
}

/* Feedback Table Box */
table {
    width: 100%;
    border-collapse: collapse;
    background: var(--panel);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(255,0,0,0.2);
    box-shadow: 0 0 18px rgba(255,0,0,0.15);
}

/* Table Heading */
th {
    background: rgba(255,0,0,0.15);
    color: var(--accent-light);
    padding: 14px;
    font-size: 0.95rem;
    text-align: left;
    border-bottom: 1px solid rgba(255,0,0,0.25);
}

/* Table Rows */
td {
    padding: 14px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    color: #fff;
    font-size: 0.92rem;
}

/* Comment box handling */
.comment-box {
    max-width: 300px;
    white-space: pre-line;
    word-wrap: break-word;
}

/* Hover Effect */
tbody tr:hover td {
    background: rgba(255,0,0,0.05);
    border-left: 3px solid rgba(255,0,0,0.4);
    transition: 0.2s ease;
}

/* Delete button */
.delete-btn {
    background: linear-gradient(180deg, #ff3030, #d60000);
    padding: 8px 14px;
    border-radius: 8px;
    font-weight: 600;
    color: white;
    text-decoration: none;
    font-size: 0.85rem;
    border: 1px solid rgba(255,0,0,0.3);
    box-shadow: 0 0 8px rgba(255,0,0,0.25);
    transition: 0.2s ease;
}

.delete-btn:hover {
    transform: translateY(-2px);
    background: linear-gradient(180deg, #ff5050, #ff1a1a);
    box-shadow: 0 0 12px rgba(255,0,0,0.35);
}

/* Empty state message */
td[colspan] {
    background: rgba(255,255,255,0.02);
    color: var(--muted);
    border-radius: 8px;
    font-size: 1rem;
}

/* Mobile Responsive */
@media (max-width: 720px) {
    table, thead, tbody, th, td, tr {
        display: block;
        width: 100%;
    }

    thead {
        display: none;
    }

    tr {
        margin-bottom: 15px;
        background: rgba(255,255,255,0.03);
        padding: 12px;
        border-radius: 10px;
    }

    td {
        display: flex;
        justify-content: space-between;
        padding: 10px;
        border-bottom: none;
    }

    td::before {
        content: attr(data-label);
        font-weight: 600;
        color: var(--muted);
        margin-right: 10px;
    }
}
/* Page Header */
.page-header {
    text-align: center;
    margin-bottom: 30px;
    padding-bottom: 10px;
}

.main-title {
    font-size: 2.2rem;
    color: var(--accent);
    font-weight: 700;
    text-shadow: 0 0 15px rgba(255,0,0,0.35);
    margin: 0;
}

.subtitle {
    font-size: 1rem;
    color: var(--muted);
    margin-top: 6px;
}
.content-wrapper {
    width: 100%;
    max-width: 1200px; /* increase width */
    text-align: center;
    margin: 0 auto;
}

 .back-btn {
    position: fixed;  /* stays in top-left corner */
    top: 20px;
    left: 20px;
    color: white;     /* white arrow and text */
    text-decoration: none;
    font-weight: 600;
    font-size: 1rem;
    display: flex;
    align-items: center;
    gap: 6px; /* space between arrow and text */
}
.back-btn:hover {
    color: #ff6b6b; /* optional hover color */
}

</style>

</head>

<body>

    <a href="/adminhome/" class="back-btn">← Back</a>

  <div class="content-wrapper">

<div class="page-header">
    <h2 class="main-title">📋 All Feedbacks</h2>
    
</div>



<table>
    <thead>
        <tr>
            <th>Website Rating</th>
            <th>Workout Rating</th>
            <th>Comment</th>
            <th>User Email</th>
            <th>Submitted On</th>
            <th>Action</th> <!-- added -->
        </tr>
    </thead>

    <tbody>
        {% for f in work %}
        <tr>
            <td>{{ f.website_rating }}</td>
            <td>{{ f.workout_rating }}</td>
            <td class="comment-box">{{ f.comment }}</td>
            <td>{{ f.email }}</td>
            <td>{{ f.created_at }}</td>
            <td>
    <a class="delete-btn" 
       href="/deletefeedback/{{ f.id }}/" 
       onclick="return confirm('Are you sure you want to delete this feedback?');">
       Delete
    </a>
</td>

        </tr>
        {% empty %}
        <tr>
            <td colspan="6" style="text-align:center; padding:20px;">
                No feedback submitted yet.
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</div>

</body>
</html>
