<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Free Trial Started</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

    :root{
      --bg-dark: #060507;
      --panel: rgba(12,12,12,0.92);
      --accent: #ff2b2b;
      --accent-2: #ff6b6b;
      --muted: rgba(255,255,255,0.75);
      --radius: 14px;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:'Poppins',sans-serif;
    }

    html,body{
      height:100%;
      background: linear-gradient(180deg,#030305 0%, #070708 60%);
      color:#fff;
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:30px;
    }

    /* MAIN CARD */
    .trial-card{
      max-width:520px;
      width:100%;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(8px);
      border-radius: var(--radius);
      padding:32px 28px;
      border:1px solid rgba(255,0,0,0.35);
      box-shadow: 0 0 25px rgba(255,0,0,0.25);
      text-align:center;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn{
      from{opacity:0; transform:translateY(15px);}
      to{opacity:1; transform:translateY(0);}
    }

    /* TITLE */
    .trial-card h1{
      font-size:2rem;
      font-weight:700;
      color:var(--accent);
      margin-bottom:16px;
      text-shadow:0 0 14px rgba(255,0,0,0.35);
    }

    /* INFO TEXT */
    .trial-card p{
      font-size:1rem;
      color:var(--muted);
      margin-bottom:12px;
      line-height:1.6;
    }

    .trial-card strong{
      color:#fff;
      font-weight:600;
    }

    /* DATE BOX */
    .date-box{
      margin:18px 0 26px;
      padding:14px;
      border-radius:10px;
      background: rgba(255,0,0,0.08);
      border:1px solid rgba(255,0,0,0.35);
      font-size:0.95rem;
    }

    /* BUTTON */
    .btn-start{
      display:inline-block;
      margin-top:10px;
      padding:12px 28px;
      background: linear-gradient(180deg,#ff3030,#e60000);
      color:#fff;
      text-decoration:none;
      border-radius:999px;
      font-weight:700;
      font-size:0.95rem;
      letter-spacing:0.4px;
      box-shadow:0 0 16px rgba(255,0,0,0.45);
      transition:all 0.2s ease;
    }

    .btn-start:hover{
      transform:translateY(-2px);
      box-shadow:0 0 26px rgba(255,0,0,0.65);
    }

    .btn-start:active{
      transform:translateY(0);
      box-shadow:0 0 14px rgba(255,0,0,0.45);
    }

    /* SUBTEXT */
    .note{
      margin-top:16px;
      font-size:0.85rem;
      color:rgba(255,255,255,0.6);
    }

  </style>
</head>

<body>

  <div class="trial-card">

    <h1>🎉 Free Trial Started!</h1>

    <p>
      You are now using
      <strong>{{ plan.package_name }}</strong>
    </p>

    <div class="date-box">
      Trial valid till:
      <strong>{{ end_date|date:"d M Y" }}</strong>
    </div>

    <a href="/home/" class="btn-start">
      Start Using
    </a>

    <div class="note">
      Enjoy full AI workout tracking during your free trial
    </div>

  </div>

</body>
</html>
