<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admin</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: 'Poppins', sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  background:
    linear-gradient(rgba(0,0,0,0.75), rgba(10,0,0,0.75)),
    url('https://images.unsplash.com/photo-1605296867304-46d5465a13f1?auto=format&fit=crop&w=1920&q=80')
    center/cover fixed no-repeat;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

/* form container (centered card like Register/Login) */
form {
  width: 420px;
  max-width: 94%;
  background-color: rgba(12,12,12,0.92);
  backdrop-filter: blur(8px);
  padding: 32px;
  border-radius: 14px;
  border: 1px solid rgba(255,0,0,0.28);
  box-shadow: 0 18px 40px rgba(0,0,0,0.6), 0 0 28px rgba(255,0,0,0.08);
  display: flex;
  flex-direction: column;
  gap: 14px;
  transform: translateZ(0);
  animation: fadeIn 0.6s ease-out;
}

/* small heading using the same neon style (optional, uses ::before if you don't add an h2) */
form::before {
  content: "Admin Login";
  display:block;
  text-align:center;
  font-weight:700;
  font-size:1.15rem;
  color:#ff5b5b;
  margin-bottom:4px;
  text-shadow: 0 0 8px rgba(255,0,0,0.12);
}

/* labels */
label {
  display:block;
  color: #ff9a9a;
  font-weight:600;
  font-size:0.95rem;
  margin-bottom:6px;
}

/* inputs */
input[type="text"],
input[type="password"] {
  width:100%;
  min-height:44px;
  padding:10px 12px;
  border-radius:10px;
  border:2px solid rgba(60,60,60,0.9);
  background-color: rgba(0,0,0,0.72);
  color:#fff;
  font-size:0.98rem;
  outline:none;
  box-shadow: 0 6px 14px rgba(0,0,0,0.45) inset;
  transition: border-color .16s ease, box-shadow .16s ease, transform .12s ease;
}

/* focus state */
input:focus {
  border-color:#ff2b2b;
  box-shadow: 0 0 12px rgba(255,0,0,0.14);
  background-color: rgba(0,0,0,0.85);
}

/* submit button */
button {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background: linear-gradient(180deg,#ff3030,#e60000);
  color:#fff;
  font-weight:700;
  cursor:pointer;
  margin-top:6px;
  transition: transform .12s ease, box-shadow .12s ease;
}
button:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(230,0,0,0.16); }

/* responsive */
@media (max-width:480px) {
  form { width: 94%; padding: 24px; gap:12px; }
  input[type="text"], input[type="password"] { min-height:46px; }
}

/* small entrance animation */
@keyframes fadeIn {
  0% { opacity:0; transform: translateY(12px); }
  100% { opacity:1; transform: translateY(0); }
}
</style>
</head>
<body>
    <form method="POST" >
        {% csrf_token %}
            <label > Username</label>
            <input type="text" name="username" required>
            <label > Password</label>
            <input type="password" name="password" required>
            <button type="submit" >Submit</button>
        </form>
</body>
</html>
