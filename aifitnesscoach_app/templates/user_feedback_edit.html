<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Feedback</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

        * { box-sizing: border-box; }

        html, body {
            height: 100vh;
            margin: 0;
            padding: 0;
            background:
              linear-gradient(rgba(0,0,0,0.75), rgba(10,0,0,0.75)),
              url('https://images.unsplash.com/photo-1605296867304-46d5465a13f1?auto=format&fit=crop&w=1920&q=80') center/cover fixed no-repeat;
            font-family: 'Poppins', sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        form {
            width: 420px;
            max-width: 94%;
            background-color: rgba(12, 12, 12, 0.92);
            padding: 36px 28px;
            border-radius: 14px;
            border: 1px solid rgba(255, 0, 0, 0.38);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.6), 0 0 28px rgba(255, 0, 0, 0.12);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        form::before {
            content: "Edit Feedback";
            display: block;
            text-align: center;
            font-size: 1.25rem;
            font-weight: 600;
            color: #ff5b5b;
            margin-bottom: 16px;
            text-shadow: 0 0 8px rgba(255,0,0,0.12);
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 0.95rem;
            color: #ff8a8a;
            margin: 10px 0 6px 0;
        }

        textarea, select, input[type="number"] {
            width: 100%;
            min-height: 46px;
            padding: 12px 14px;
            border-radius: 10px;
            border: 2px solid rgba(60,60,60,0.9);
            background-color: rgba(0,0,0,0.78);
            color: #fff;
            font-size: 1rem;
            outline: none;
            resize: vertical;
        }

        textarea {
            min-height: 100px;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #ff2b2b;
            box-shadow: 0 0 12px rgba(255,0,0,0.16);
            background-color: rgba(0,0,0,0.85);
        }

        button, input[type="submit"] {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(180deg, #ff3030, #e60000);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            margin-top: 6px;
            transition: transform .12s ease, box-shadow .12s ease;
            box-shadow: 0 10px 28px rgba(230,0,0,0.12);
        }

        button:hover, input[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 36px rgba(230,0,0,0.18);
        }

        .back-btn {
            text-decoration: none;
            color: #fff;
            position: absolute;
            top: 20px;
            left: 20px;
        }

        @media (max-width:480px) {
            form { width: 94%; padding: 26px; }
        }
    </style>
</head>
<body>
    <form method="POST">
        <a href="/user_feedback_list/" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        {% csrf_token %}
        
        <label for="website_rating">Website Rating</label>
        <input type="number" name="website_rating" id="website_rating" min="1" max="5" value="{{ feedback.website_rating }}" required>

        <label for="workout_rating">Workout Rating</label>
        <input type="number" name="workout_rating" id="workout_rating" min="1" max="5" value="{{ feedback.workout_rating }}" required>

        <label for="comment">Comment</label>
        <textarea name="comment" id="comment">{{ feedback.comment|default:"" }}</textarea>

        <button type="submit">Save Feedback</button>
    </form>
</body>
</html>
