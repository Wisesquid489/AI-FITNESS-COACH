<html>
<html lang="en">
<head>
    <title>Workout TIps</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

* { box-sizing: border-box; }

html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    background:
      linear-gradient(rgba(0,0,0,0.75), rgba(10,0,0,0.75)),
      url('https://images.unsplash.com/photo-1605296867304-46d5465a13f1?auto=format&fit=crop&w=1920&q=80')
      center/cover fixed no-repeat;
    font-family: 'Poppins', sans-serif;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Form container */
form {
    position: relative;
    z-index: 10;
    width: 420px;
    max-width: 90%;
    background-color: rgba(12, 12, 12, 0.92);
    backdrop-filter: blur(10px);
    padding: 35px;
    border-radius: 14px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.6), 
                0 0 28px rgba(255,0,0,0.18);
    border: 1px solid rgba(255,0,0,0.35);
    display: flex;
    flex-direction: column;
    gap: 16px;
    animation: fadeIn 0.7s ease-out;
}

/* Title */
form::before {
    content: "Add Workout Tips 🏋️‍♂️";
    display: block;
    text-align: center;
    font-size: 1.35rem;
    font-weight: 600;
    color: #ff5b5b;
    margin-bottom: 12px;
    text-shadow: 0 0 10px rgba(255,0,0,0.4);
    animation: titlePulse 2.2s infinite ease-in-out;
}

/* Labels */
label {
    color: #ff8a8a;
    font-weight: 600;
    font-size: 0.95rem;
    opacity: 0;
    transform: translateX(-10px);
    animation: slideLabel 0.6s ease forwards;
}

/* Inputs */
input[type="text"],
input[type="file"] {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 2px solid rgba(60,60,60,0.9);
    background-color: rgba(0, 0, 0, 0.72);
    color: #fff;
    font-size: 0.95rem;
    outline: none;
    transition: all 0.2s ease;
}

input:focus {
    border-color: #ff2b2b;
    box-shadow: 0 0 12px rgba(255,0,0,0.25);
    background-color: rgba(0,0,0,0.85);
}

/* File input */
input[type="file"] {
    padding: 8px;
    border-style: dashed;
    background-color: rgba(15,15,15,0.65);
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(180deg, #ff3030, #e60000);
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: transform .12s ease, box-shadow .12s ease;
    animation: btnPulse 1.8s infinite ease-in-out;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(230,0,0,0.28);
}

/* Animations */
@keyframes fadeIn {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
}

@keyframes titlePulse {
    0%   { text-shadow: 0 0 8px rgba(255, 0, 0, 0.3); }
    50%  { text-shadow: 0 0 20px rgba(255, 0, 0, 0.6); }
    100% { text-shadow: 0 0 8px rgba(255, 0, 0, 0.3); }
}

@keyframes btnPulse {
    0%   { transform: scale(1); box-shadow: 0 0 10px rgba(255,0,0,0.25); }
    50%  { transform: scale(1.04); box-shadow: 0 0 20px rgba(255,0,0,0.45); }
    100% { transform: scale(1); box-shadow: 0 0 10px rgba(255,0,0,0.25); }
}

@keyframes slideLabel {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: translateX(0); }
}

/* Mobile */
@media (max-width: 480px) {
    form {
        width: 94%;
        padding: 24px;
        gap: 12px;
    }
    form::before {
        font-size: 1.1rem;
    }
}
</style>

</head>
<body> 
     <form method="POST" action="" enctype="multipart/form-data">
        {% csrf_token %}
        <label>Workout</label>
        <input type="text" name="workout" value="{{work.workout}}" required>
        <label>image</label>
        <input type="file" name="image" >
        <label>Duration</label>
        <input type="text" name="duration" value="{{work.duration}}" required>
        <label>Description</label>
        <input type="text" name="description" value="{{work.description}}" required>
        <button type="submit" onclick="alert('Edited Successfully')">Submit</button>
    </form>

</html>
