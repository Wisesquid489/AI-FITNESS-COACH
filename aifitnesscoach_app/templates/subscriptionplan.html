<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Subscription Plan</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

/* Background */
body {
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    background:
      linear-gradient(rgba(0,0,0,0.78), rgba(10,0,0,0.78)),
      url('https://images.unsplash.com/photo-1605296867304-46d5465a13f1?auto=format&fit=crop&w=1920&q=80')
      center / cover no-repeat fixed;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
}

/* Form Container */
.form-container {
    width: 420px;
    max-width: 92%;
    background: rgba(12, 12, 12, 0.92);
    backdrop-filter: blur(10px);
    padding: 32px;
    border-radius: 14px;
    border: 1px solid rgba(255,0,0,0.35);
    box-shadow:
        0 18px 40px rgba(0,0,0,0.6),
        0 0 28px rgba(255,0,0,0.18);
    animation: fadeIn 0.6s ease-out;
}

/* Title */
h2 {
    text-align: center;
    margin-bottom: 18px;
    font-size: 1.4rem;
    font-weight: 700;
    color: #ff5b5b;
    text-shadow: 0 0 12px rgba(255,0,0,0.45);
}

/* Labels */
label {
    display: block;
    margin-top: 14px;
    margin-bottom: 4px;
    font-weight: 600;
    font-size: 0.95rem;
    color: #ff8a8a;
}

/* Inputs */
input,
select,
textarea {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 2px solid rgba(60,60,60,0.9);
    background-color: rgba(0,0,0,0.72);
    color: #fff;
    font-size: 0.95rem;
    outline: none;
    transition: all 0.2s ease;
}

/* Remove white autofill */
input:-webkit-autofill,
textarea:-webkit-autofill {
    -webkit-box-shadow: 0 0 0 1000px rgba(0,0,0,0.85) inset !important;
    -webkit-text-fill-color: #fff !important;
}

/* Focus */
input:focus,
select:focus,
textarea:focus {
    border-color: #ff2b2b;
    box-shadow: 0 0 12px rgba(255,0,0,0.28);
    background-color: rgba(0,0,0,0.85);
}

/* Select dropdown */
select {
    appearance: none;
    cursor: pointer;
}

select option {
    background-color: #0c0c0c;
    color: #fff;
}

/* Textarea */
textarea {
    resize: none;
}

/* Button */
button {
    width: 100%;
    margin-top: 22px;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(180deg, #ff3030, #e60000);
    color: #fff;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 28px rgba(230,0,0,0.35);
}

/* Animation */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Mobile */
@media (max-width: 480px) {
    .form-container {
        padding: 24px;
    }

    h2 {
        font-size: 1.2rem;
    }
}

 .back-btn {
    position: fixed;  /* stays in top-left corner */
    top: 20px;
    left: 20px;
    color: white;     /* white arrow and text */
    text-decoration: none;
    font-weight: 600;
    font-size: 1rem;
    display: flex;
    align-items: center;
    gap: 6px; /* space between arrow and text */
}
.back-btn:hover {
    color: #ff6b6b; /* optional hover color */
}
</style>
</head>

<body>

     <a href="/adminhome/" class="back-btn">← Back</a>

<div class="form-container">
    <h2>Add Subscription Plan</h2>

    <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <!-- Package Name: Required, max 20 chars -->
    <label>Package Name</label>
    <input type="text" name="package_name" maxlength="20" placeholder="Enter package name" required>

    <!-- Duration: Required, positive integer only -->
    <label>Duration (in days)</label>
    <input type="number" name="duration" min="1" placeholder="Enter duration in days" required>

    <!-- Fees: Required, positive integer only -->
    <label>Fees</label>
    <input type="number" name="fees" min="0" placeholder="Enter fees" required>

    <!-- Plan Type: Required, select from choices -->
    <label>Plan Type</label>
    <select name="type" required>
        <option value="">Select Level</option>
        <option value="beginner">Beginner</option>
        <option value="intermediate">Intermediate</option>
        <option value="expert">Expert</option>
    </select>

    <!-- Description: Required, max 200 chars -->
    <label>Description</label>
    <textarea name="description" rows="3" maxlength="200" placeholder="Short description" required></textarea>

    <!-- Plan Image: Required, only images allowed -->
    <label>Plan Image</label>
    <input type="file" name="image" accept="image/*" required>

    <button type="submit">Save Plan</button>
</form>


</div>

</body>
</html>
