<html>
    <head><title> Register</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

* { box-sizing: border-box; }

/* Static background (no movement) */
html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    background:
      linear-gradient(rgba(0,0,0,0.75), rgba(10,0,0,0.75)),
      url('https://images.unsplash.com/photo-1605296867304-46d5465a13f1?auto=format&fit=crop&w=1920&q=80') 
      center/cover fixed no-repeat;
    font-family: 'Poppins', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Safeguard – nothing blocks clicks */
body > * { pointer-events: auto; }

/* Main Form Styling */
form {
    position: relative;
    z-index: 9999;
    width: 420px;
    max-width: calc(100% - 40px);
    max-height: 90vh;
    overflow: auto;
    background-color: rgba(12,12,12,0.92);
    backdrop-filter: blur(8px);
    padding: 36px 32px 28px;
    border-radius: 14px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.6), 0 0 28px rgba(255,0,0,0.12);
    border: 1px solid rgba(255,0,0,0.38);
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: transform .25s ease, box-shadow .25s ease;
}

/* Card Hover Lift */
form:hover {
    transform: translateY(-8px);
    box-shadow: 0 28px 60px rgba(0,0,0,0.65), 0 0 40px rgba(255,0,0,0.22);
}

/* Title Above Form */
form::before {
    content: "Registration";
    display: block;
    text-align: center;
    font-size: 1.15rem;
    font-weight: 600;
    color: #ff5b5b;
    margin-bottom: 8px;
    text-shadow: 0 0 8px rgba(255,0,0,0.12);
    position: relative;
    z-index: 10001;
}

/* Label Slide-in Animation */
label {
    display: block;
    margin: 0;
    color: #ff9a9a;
    font-weight: 600;
    font-size: 0.92rem;
    opacity: 0;                      
    transform: translateX(-10px);    
    animation: slideLabel 0.6s ease forwards;
}

/* Stagger animation timing */
form label:nth-of-type(1)  { animation-delay: 0.06s; }
form label:nth-of-type(2)  { animation-delay: 0.12s; }
form label:nth-of-type(3)  { animation-delay: 0.18s; }
form label:nth-of-type(4)  { animation-delay: 0.24s; }
form label:nth-of-type(5)  { animation-delay: 0.30s; }
form label:nth-of-type(6)  { animation-delay: 0.36s; }
form label:nth-of-type(7)  { animation-delay: 0.42s; }
form label:nth-of-type(8)  { animation-delay: 0.48s; }
form label:nth-of-type(9)  { animation-delay: 0.54s; }
form label:nth-of-type(10) { animation-delay: 0.60s; }
form label:nth-of-type(11) { animation-delay: 0.66s; }
form label:nth-of-type(12) { animation-delay: 0.72s; }

/* Input Styling */
input[type="text"],
input[type="number"],
input[type="email"],
input[type="password"],
input[type="file"],
select,
textarea {
    display: block;
    width: 100%;
    min-height: 44px;
    padding: 10px 12px;
    border-radius: 8px;
    border: 2px solid rgba(60,60,60,0.9);
    background-color: rgba(0,0,0,0.72);
    color: #fff;
    font-size: 0.95rem;
    outline: none;
    position: relative;
    z-index: 10000;
}

/* File Input */
input[type="file"] {
    padding: 8px 10px;
    background-color: rgba(15,15,15,0.6);
    border-style: dashed;
}

/* Focus Glow */
input:focus, select:focus, textarea:focus {
    border-color: #ff2b2b;
    box-shadow: 0 0 12px rgba(255,0,0,0.18);
    background-color: rgba(0,0,0,0.85);
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(180deg, #ff3030, #e60000);
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    margin-top: 6px;
    transition: transform .12s ease, box-shadow .12s ease;
    animation: btnPulse 1.8s infinite ease-in-out;
}
button:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(230,0,0,0.18); }

/* Select Arrow */
select {
    appearance: none;
    padding-right: 40px;
    background-image:
      linear-gradient(45deg, transparent 50%, #ff6060 50%),
      linear-gradient(135deg, #ff6060 50%, transparent 50%);
    background-position: calc(100% - 14px) calc(1em + 2px), calc(100% - 8px) calc(1em + 2px);
    background-size: 8px 8px;
    background-repeat: no-repeat;
}

/* Responsive */
@media (max-width: 480px) {
    form { width: 94%; padding: 20px; max-height: 92vh; gap: 10px; }
    input[type="text"], input[type="email"], input[type="password"], input[type="number"] { min-height: 46px; }
}

/* --- ANIMATIONS --- */

/* Form Fade-In */
form {
    animation: fadeIn 0.8s ease-out;
}
@keyframes fadeIn {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
}

/* Neon Title Pulse */
form::before {
    animation: titlePulse 2.2s infinite ease-in-out;
}
@keyframes titlePulse {
    0%   { text-shadow: 0 0 8px rgba(255,0,0,0.25); }
    50%  { text-shadow: 0 0 18px rgba(255,0,0,0.55); }
    100% { text-shadow: 0 0 8px rgba(255,0,0,0.25); }
}

/* Button Soft Pulse */
@keyframes btnPulse {
    0%   { transform: scale(1); box-shadow: 0 0 10px rgba(255,0,0,0.25); }
    50%  { transform: scale(1.04); box-shadow: 0 0 22px rgba(255,0,0,0.45); }
    100% { transform: scale(1); box-shadow: 0 0 10px rgba(255,0,0,0.25); }
}

/* Label Slide-In */
@keyframes slideLabel {
    0%   { opacity: 0; transform: translateX(-10px); }
    100% { opacity: 1; transform: translateX(0); }
}
</style>
</head>
    <body>
        <form method="POST" enctype="multipart/form-data" onsubmit="return validatePasswords()">
    {% csrf_token %}

    <!-- Name: Required, max 100 chars -->
    <label>Name</label>
    <input type="text" name="name" maxlength="100" placeholder="Enter full name" required>

    <!-- Age: Required, integer between 10-100 -->
    <label>Age</label>
    <input type="number" name="age" min="10" max="100" placeholder="Enter age" required>

    <!-- Email: Required, valid email format -->
    <label>Email</label>
    <input type="email" name="email" placeholder="Enter email" required>

    <!-- Password: Required, min 6 chars -->
    <label>Password</label>
    <input type="password" name="password" minlength="6" maxlength="30" placeholder="Enter password" required>

    <!-- Confirm Password: Required -->
    <label>Confirm Password</label>
    <input type="password" name="confirmpassword" minlength="6" maxlength="30" placeholder="Confirm password" required>

    <!-- Gender: Required -->
    <label>Gender</label>
    <select name="gender" required>
        <option value="">--Select--</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="others">Others</option>
    </select>

    <!-- Height: Required, integer 1-251 cm -->
    <label>Height (cm)</label>
    <input type="number" name="height" min="1" max="251" placeholder="Enter height in cm" required>

    <!-- Weight: Required, integer 10-640 kg -->
    <label>Weight (kg)</label>
    <input type="number" name="weight" min="10" max="640" placeholder="Enter weight in kg" required>

    <!-- Image: Required, only images -->
    <label>Image</label>
    <input type="file" name="image" accept="image/*" >

    <!-- Fitness Goal: Required -->
    <label>Fitness Goal</label>
    <select name="fitnessgoal" required>
        <option value="">--Select--</option>
        <option value="musclebuilding">Muscle Building</option>
        <option value="weightloss">Weight Loss</option>
        <option value="weightgain">Weight Gaining</option>
        <option value="bodybuilding">BodyBuilding Competition</option>
        <option value="fitness">General Fitness</option>
    </select>

    <button type="submit">Submit</button>
</form>

<script>
function validatePasswords() {
    const pwd = document.querySelector('input[name="password"]').value;
    const confirmPwd = document.querySelector('input[name="confirmpassword"]').value;
    if (pwd !== confirmPwd) {
        alert("Passwords do not match!");
        return false;
    }
    return true;
}
</script>

    </body>
</html>
