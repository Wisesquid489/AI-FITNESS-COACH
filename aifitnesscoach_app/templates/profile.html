<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html, body {
    height: auto;
    background: linear-gradient(rgba(0,0,0,0.75), rgba(10,0,0,0.75)),
                url('https://images.unsplash.com/photo-1605296867304-46d5465a13f1?auto=format&fit=crop&w=1920&q=80')
                center/cover fixed no-repeat;
    font-family: 'Poppins', sans-serif;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

/* Profile Card */
.profile-card {
    width: 420px;
    max-width: 95%;
    background-color: rgba(12, 12, 12, 0.92);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 14px;
    border: 1px solid rgba(255, 0, 0, 0.3);
    box-shadow: 0 15px 40px rgba(0,0,0,0.6), 0 0 20px rgba(255,0,0,0.2);
    animation: fadeIn 0.7s ease-out;
}

/* Title */
.profile-card h2 {
    text-align: center;
    margin-bottom: 20px;
    font-size: 1.4rem;
    color: #ff5b5b;
    text-shadow: 0 0 10px rgba(255,0,0,0.3);
}

/* Row item */
.profile-row {
    background: rgba(20, 20, 20, 0.8);
    padding: 12px 16px;
    border-radius: 10px;
    margin-bottom: 12px;
    border: 1px solid rgba(255,255,255,0.05);
    display: flex;
    justify-content: space-between;
    align-items: center;
}



.profile-row span {
    font-weight: 600;
    color: #ff8a8a;
}

.profile-row strong {
    color: #fff;
    font-weight: 700;
}

/* Image */
.profile-image {
    width: 140px;
    height: 140px;
    border-radius: 12px;
    object-fit: cover;
    margin: 10px auto 20px auto;
    display: block;
    border: 2px solid rgba(255,0,0,0.3);
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
}

/* Edit Button */
button, input[type="button"] {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(180deg, #ff3030, #e60000);
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.2s ease;
}

button:hover, input[type="button"]:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(230,0,0,0.25);
}
.back-btn{
    text-decoration: none;
    color:#fff;

}

/* Fade animation */
@keyframes fadeIn {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
}

/* Mobile */
@media (max-width: 480px) {
    .profile-card { padding: 20px; }
    .profile-row { padding: 10px 14px; }
}

.back-btn {
    position: fixed;  /* stays in top-left corner */
    top: 20px;
    left: 20px;
    color: white;     /* white arrow and text */
    text-decoration: none;
    font-weight: 600;
    font-size: 1rem;
    display: flex;
    align-items: center;
    gap: 6px; /* space between arrow and text */
}
.back-btn:hover {
    color: #ff6b6b; /* optional hover color */
}

</style>

</head>
<body>
    <a href="/home/" class="back-btn">← Back</a>
    
    <div class="profile-card">
        
        <h2>Profile</h2>
        <!-- Image -->
         {% if user.image %}
        <img src="{{ user.image.url }}" class="profile-image">
        {% else %}
         <img src="" class="profile-image">
        {% endif %}
        <!-- Name -->
        <div class="profile-row">
            <span>Name</span>
            <strong>{{ user.name }}</strong>
        </div>
        
        <!-- Email -->
        <div class="profile-row">
            <span>Email</span>
            <strong>{{ user.email }}</strong>
        </div>

        <!-- Age -->
        <div class="profile-row">
            <span>Age</span>
            <strong>{{ user.age }}</strong>
        </div>

        <!-- Gender -->
        <div class="profile-row">
            <span>Gender</span>
            <strong>{{ user.gender }}</strong>
        </div>

        <!-- Height -->
        <div class="profile-row">
            <span>Height</span>
            <strong>{{ user.height }}</strong>
        </div>

        <!-- Weight -->
        <div class="profile-row">
            <span>Weight</span>
            <strong>{{ user.weight }}</strong>
        </div>

        <div class="profile-row">
            <span>BMI</span>
            <strong>{{ bmi }}</strong>
        </div>

        <div class="profile-row">
            <span>Fitness Goal</span>
            <strong>{{ f }}</strong>
        </div>

    
        <!-- Password -->
        <div class="profile-row">
            <span>Password</span>
            <strong>********</strong>
        </div>

        <input type="button" value="Edit Profile" onclick="window.location.href='/editprofile/';">
    </div>
</body>

</html>
