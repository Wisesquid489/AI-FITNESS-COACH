<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Payment Successful</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --accent:#ff2b2b;
      --accent-light:#ff6b6b;
      --muted:rgba(255,255,255,.7);
      --bg:#0c0c0c;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Poppins,sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:30px;
      color:#fff;

      /* CSS-only background (same style as other pages) */
      background:
        radial-gradient(80% 60% at 50% 0%, rgba(255,43,43,.18), transparent 60%),
        radial-gradient(60% 40% at 80% 100%, rgba(255,43,43,.12), transparent 60%),
        linear-gradient(180deg,#030305 0%, #070708 60%);
    }

    .card{
      max-width:420px;
      width:100%;
      background:rgba(12,12,12,.95);
      border-radius:16px;
      padding:32px 28px;
      text-align:center;
      border:1px solid rgba(255,0,0,.25);
      box-shadow:0 0 22px rgba(255,0,0,.18);
      backdrop-filter: blur(6px);
    }

    h1{
      font-size:1.9rem;
      font-weight:800;
      color:var(--accent);
      margin-bottom:12px;
      text-shadow:0 0 12px rgba(255,43,43,.35);
    }

    .subtitle{
      font-size:1rem;
      color:var(--muted);
      margin-bottom:10px;
    }

    .plan{
      font-size:1.25rem;
      font-weight:700;
      margin:14px 0 26px;
      color:#fff;
    }

    .btn-home{
      background:linear-gradient(180deg,#ff3030,#e60000);
      color:#fff;
      padding:12px 26px;
      border-radius:999px;
      border:1px solid rgba(255,0,0,.35);
      font-weight:700;
      font-size:.95rem;
      text-decoration:none;
      display:inline-block;
      box-shadow:0 0 14px rgba(255,0,0,.35);
      transition:.2s ease;
    }

    .btn-home:hover{
      transform:translateY(-2px);
      box-shadow:0 0 22px rgba(255,0,0,.55);
    }

    .btn-home:active{
      transform:translateY(0);
      box-shadow:0 0 10px rgba(255,0,0,.4);
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Payment Successful</h1>

    <p class="subtitle">
      You have successfully subscribed to
    </p>

    <div class="plan">
      {{ plan.package_name }}
    </div>

    <a href="/home/" class="btn-home">
      Go Home
    </a>
  </div>

</body>
</html>
