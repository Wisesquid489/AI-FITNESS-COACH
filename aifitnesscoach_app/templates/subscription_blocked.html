<!DOCTYPE html>
<html>
<head>
  <title>Active Subscription</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-red-50 min-h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-xl shadow text-center max-w-md">
    <h1 class="text-2xl font-bold text-red-600 mb-4">
      Active Subscription Found
    </h1>

    <p class="text-gray-700 mb-2">
      You already have an active plan:
    </p>

    <p class="font-semibold text-lg">
      {{ active_plan.package_name }}
    </p>

    <p class="mt-3 text-sm text-gray-600">
      Valid till: {{ end_date|date:"d M Y" }}
    </p>

    <a href="/usersubscription/"
       class="inline-block mt-6 bg-gray-800 text-white px-6 py-2 rounded-full">
      Back to Plans
    </a>
  </div>
</body>
</html>
